<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — The Frame Manager</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .login-card h1 { font-size: 1.4em; text-align: center; margin-bottom: 8px; color: #1e293b; }
        .login-card .subtitle { text-align: center; color: #64748b; font-size: .9em; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: .8em; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: .95em; transition: border-color .15s; }
        .form-group input:focus { outline: none; border-color: #4361ee; box-shadow: 0 0 0 3px rgba(67,97,238,.1); }
        .btn { width: 100%; padding: 12px; background: #4361ee; color: #fff; border: none; border-radius: 8px; font-size: .95em; font-weight: 600; cursor: pointer; transition: background .15s; }
        .btn:hover { background: #3a56d4; }
        .error { background: #fef2f2; color: #991b1b; padding: 10px 14px; border-radius: 8px; font-size: .85em; margin-bottom: 16px; text-align: center; border: 1px solid #fecaca; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>☕ The Frame</h1>
        <div class="subtitle">Sign in to manager</div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button class="btn" type="submit">Sign in</button>
        </form>
    </div>
</body>
</html>
